<!DOCTYPE html>
<html>
<head>
<title>PyMentor - AI Python Tutor</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: "Inter", sans-serif;
  min-height: 100vh;
  background: radial-gradient(circle at top, #eef2ff, #e0e7ff);
  display: flex;
  justify-content: center;
  align-items: center;
  color: #0f172a;
}

/* Main Card */
.container {
  width: 760px;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(18px);
  border-radius: 24px;
  padding: 30px 30px 20px;
  box-shadow: 0 40px 90px rgba(0,0,0,0.15);
  border: 1px solid rgba(255,255,255,0.6);
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}

.logo {
  font-size: 28px;
  font-weight: 600;
}

.brand {
  background: linear-gradient(90deg,#2563eb,#9333ea);
  -webkit-background-clip: text;
  color: transparent;
}

.status {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 999px;
  background: #dcfce7;
  color: #166534;
  font-weight: 600;
}

/* Chat */
.chat-box {
  background: #f8fafc;
  border-radius: 18px;
  padding: 20px;
  height: 360px;
  overflow-y: auto;
  margin-bottom: 14px;
  border: 1px solid #e5e7eb;
  scrollbar-width: thin;
}

.chat-box::-webkit-scrollbar {
  width: 6px;
}
.chat-box::-webkit-scrollbar-thumb {
  background: #c7d2fe;
  border-radius: 10px;
}

.msg { margin-bottom: 16px; }

.user { text-align: right; }

.user .bubble {
  display: inline-block;
  background: linear-gradient(135deg,#2563eb,#9333ea);
  color: white;
  padding: 10px 14px;
  border-radius: 16px 16px 4px 16px;
  max-width: 75%;
  font-size: 14px;
}

.bot .bubble {
  display: inline-block;
  background: white;
  padding: 14px 16px;
  border-radius: 16px 16px 16px 4px;
  max-width: 80%;
  font-family: "JetBrains Mono", monospace;
  line-height: 1.6;
  font-size: 13px;
  border: 1px solid #e5e7eb;
  box-shadow: 0 10px 20px rgba(0,0,0,0.05);
}

/* Input Area */
form {
  display: flex;
  gap: 10px;
  position: sticky;
  bottom: 0;
  background: transparent;
}

textarea {
  flex: 1;
  height: 58px;
  padding: 12px 14px;
  border-radius: 14px;
  border: 1px solid #c7d2fe;
  font-size: 14px;
  background: white;
  outline: none;
}

textarea::placeholder {
  color: #94a3b8;
}

textarea:focus {
  border-color: #6366f1;
  box-shadow: 0 0 0 4px rgba(99,102,241,0.15);
}

button {
  width: 96px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(135deg,#2563eb,#9333ea);
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

button:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 20px rgba(99,102,241,0.4);
}

/* Footer */
.footer {
  margin-top: 10px;
  text-align: center;
  font-size: 11px;
  color: #64748b;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="logo">🐍 <span class="brand">PyMentor</span></div>
    <div class="status">● Online</div>
  </div>

  <div class="chat-box">
    {% if question %}
    <div class="msg user">
      <div class="bubble">{{ question }}</div>
    </div>
    {% endif %}

    {% if answer %}
    <div class="msg bot">
      <div class="bubble">{{ answer }}</div>
    </div>
    {% endif %}
  </div>

  <form method="POST">
    <textarea name="question" placeholder="Ask about Python, errors, code, concepts..."></textarea>
    <button type="submit">Send</button>
  </form>

  <div class="footer">
    Powered by RAG + Ollama · Built by Mitul Jain
  </div>

</div>

</body>
</html>
